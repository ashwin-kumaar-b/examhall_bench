<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Cyberpunk Favicon Theme -->
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#9d00ff" />
    </linearGradient>
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Room boundary shape -->
  <rect x="32" y="32" width="448" height="448" rx="40" fill="#060211" stroke="url(#neonGlow)" stroke-width="24" filter="url(#glowEffect)" />
  
  <!-- Crossed guideline crosshairs -->
  <line x1="256" y1="32" x2="256" y2="480" stroke="#ff00aa" stroke-width="12" stroke-dasharray="24 16" filter="url(#glowEffect)" />
  <line x1="32" y1="256" x2="480" y2="256" stroke="#ff00aa" stroke-width="12" stroke-dasharray="24 16" filter="url(#glowEffect)" />

  <!-- Symmetrically arranged green exam benches -->
  <!-- Quad 1 -->
  <rect x="96" y="96" width="100" height="60" rx="10" fill="#060211" stroke="#00ff88" stroke-width="12" filter="url(#glowEffect)" />
  <line x1="96" y1="126" x2="196" y2="126" stroke="#00ff88" stroke-width="6" />

  <!-- Quad 2 -->
  <rect x="316" y="96" width="100" height="60" rx="10" fill="#060211" stroke="#00ff88" stroke-width="12" filter="url(#glowEffect)" />
  <line x1="316" y1="126" x2="416" y2="126" stroke="#00ff88" stroke-width="6" />

  <!-- Quad 3 -->
  <rect x="96" y="356" width="100" height="60" rx="10" fill="#060211" stroke="#00ff88" stroke-width="12" filter="url(#glowEffect)" />
  <line x1="96" y1="386" x2="196" y2="386" stroke="#00ff88" stroke-width="6" />

  <!-- Quad 4 -->
  <rect x="316" y="356" width="100" height="60" rx="10" fill="#060211" stroke="#00ff88" stroke-width="12" filter="url(#glowEffect)" />
  <line x1="316" y1="386" x2="416" y2="386" stroke="#00ff88" stroke-width="6" />
</svg>